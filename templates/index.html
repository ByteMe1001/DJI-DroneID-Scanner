<!DOCTYPE html>
<html>
<head>
    <title>Drone Map</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<style>
    #map { height: 80vh; width: 100%; margin-bottom: 1rem; }
</style>
<body>
    <div class="container">
        <h2 class="header-title">
            <img src="{{ url_for('static', filename='dog.png') }}" alt="Dog" class="header-icon">
            DroneID Sniffer Dashboard
        </h2>

        <!-- Upload Section -->
        <div class="card">
            <h4>Upload PCAP File</h4>
            <form id="pcapForm" enctype="multipart/form-data" class="form-inline">
                <input type="file" name="pcap_file" accept=".pcap">
                <button type="submit" class="btn btn-primary">Upload</button>
            </form>
        </div>

        <!-- Controls -->
        <div class="card">
            <button class="btn btn-success" onclick="startLive()">Start Live Sniffing</button>
            <button class="btn btn-danger" onclick="stopSniff()">Stop Sniffing</button>
            <span id="status" class="status">Status: Idle</span>
        </div>

        <!-- Map -->
        <div class="card">
            <div id="map"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
